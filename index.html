<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentecostal Assemblies of God - Kenya, Mathare North Assembly Groups Management</title>
    <!-- Tailwind CSS CDN for easy styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the Inter font and general body */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5; /* Light gray background */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top */
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        /* Ensure the main app container is responsive */
        #app-container {
            max-width: 1200px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* Ensures rounded corners apply to content */
        }
        /* Specific styles for active tab button */
        .tab-button.active {
            border-bottom: 3px solid #3b82f6; /* Blue border for active tab */
            color: #3b82f6; /* Blue text for active tab */
        }
        /* Table styling for better readability */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            border-radius: 8px; /* Rounded corners for the table */
            overflow: hidden; /* Ensures rounded corners apply */
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb; /* Light gray border for rows */
        }
        th {
            background-color: #f3f4f6; /* Lighter gray for table headers */
            font-weight: 600;
            color: #374151;
        }
        tr:last-child td {
            border-bottom: none; /* No border for the last row */
        }
        /* Input and button base styles */
        input[type="text"], input[type="number"], select, button { /* Added select */
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { /* Added select */
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }
        button {
            cursor: pointer;
            font-weight: 500;
            color: white;
            background-color: #4f46e5; /* Indigo */
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        button:hover {
            background-color: #4338ca; /* Darker indigo on hover */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        .delete-button {
            background-color: #ef4444; /* Red */
        }
        .delete-button:hover {
            background-color: #dc2626; /* Darker red */
        }
        .add-button {
            background-color: #22c55e; /* Green */
        }
        .add-button:hover {
            background-color: #16a34a; /* Darker green */
        }
        .export-button {
            background-color: #0ea5e9; /* Sky blue */
        }
        .export-button:hover {
            background-color: #0284c7; /* Darker sky blue */
        }
    </style>
</head>
<body class="p-4 bg-gray-100 flex justify-center items-start min-h-screen">
    <div id="app-container" class="max-w-4xl w-full bg-white rounded-xl shadow-lg overflow-hidden">
        <h1 class="text-3xl font-extrabold text-center text-gray-800 p-6 border-b border-gray-200">Pentecostal Assemblies of God - Kenya, Mathare North Assembly Groups Management</h1>

        <!-- Tab Navigation -->
        <div id="tab-navigation" class="flex flex-wrap justify-center bg-gray-50 border-b border-gray-200">
            <!-- Buttons will be dynamically added here by JavaScript -->
        </div>

        <!-- Content Area -->
        <div id="app-content" class="p-6">
            <!-- Content will be dynamically rendered here by JavaScript -->
        </div>
    </div>

    <script>
        // Data structure to hold all group members
        // Each member now includes a 'contribution' property
        let groupsData = {
            'Group 1': [],
            'Group 2': [],
            'Group 3': [],
            'Group 4': [],
            'Group 5': [],
            'Group 6': [],
            'Group 7': [],
            'Group 8': [],
        };

        // Current active tab state
        let activeTab = 'Summary'; // Default to Summary tab

        // Get references to DOM elements
        const appContentDiv = document.getElementById('app-content');
        const tabNavigationDiv = document.getElementById('tab-navigation');

        /**
         * Renders the view for a specific group (e.g., Group 1, Group 2).
         * Allows adding and deleting members.
         * @param {string} groupName - The name of the group to render.
         */
        function renderGroupView(groupName) {
            let html = `
                <h2 class="text-2xl font-semibold text-gray-700 mb-6">${groupName}</h2>
                <div class="flex flex-col sm:flex-row gap-4 mb-6">
                    <input type="text" id="newMemberName" placeholder="Member Name" class="flex-grow p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <input type="text" id="newActivity" placeholder="Activity" class="flex-grow p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <input type="number" id="newContribution" placeholder="Contribution Amount" class="flex-grow p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent min="0" step="0.01">
                    <button onclick="addMember('${groupName}')" class="add-button px-6 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow-md transition duration-200 ease-in-out">Add Member</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white rounded-lg shadow-sm">
                        <thead>
                            <tr>
                                <th class="py-3 px-4 bg-gray-100 text-gray-600 font-semibold uppercase text-sm rounded-tl-lg">Member Name</th>
                                <th class="py-3 px-4 bg-gray-100 text-gray-600 font-semibold uppercase text-sm">Activity</th>
                                <th class="py-3 px-4 bg-gray-100 text-gray-600 font-semibold uppercase text-sm">Contribution</th>
                                <th class="py-3 px-4 bg-gray-100 text-gray-600 font-semibold uppercase text-sm rounded-tr-lg">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            if (groupsData[groupName].length === 0) {
                html += `
                    <tr>
                        <td colspan="4" class="py-4 px-4 text-center text-gray-500">No members in this group yet.</td>
                    </tr>
                `;
            } else {
                groupsData[groupName].forEach((member, index) => {
                    html += `
                        <tr>
                            <td class="py-3 px-4 border-b border-gray-200 text-gray-700">${member.name}</td>
                            <td class="py-3 px-4 border-b border-gray-200 text-gray-700">${member.activity}</td>
                            <td class="py-3 px-4 border-b border-gray-200 text-gray-700">${member.contribution !== undefined ? member.contribution.toFixed(2) : 'N/A'}</td>
                            <td class="py-3 px-4 border-b border-gray-200">
                                <button onclick="deleteMember('${groupName}', ${index})" class="delete-button px-4 py-2 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-md shadow-sm transition duration-200 ease-in-out">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            }

            html += `
                        </tbody>
                    </table>
                </div>
            `;
            appContentDiv.innerHTML = html;
        }

        /**
         * Renders the summary view, showing all members from all groups.
         * Includes a search bar to filter members.
         */
        function renderSummaryView() {
            let html = `
                <h2 class="text-2xl font-semibold text-gray-700 mb-6">Summary of All Members</h2>
                <div class="mb-6">
                    <input type="text" id="searchBar" onkeyup="filterSummary()" placeholder="Search by name, activity, group, or contribution..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white rounded-lg shadow-sm">
                        <thead>
                            <tr>
                                <th class="py-3 px-4 bg-gray-100 text-gray-600 font-semibold uppercase text-sm rounded-tl-lg">Group</th>
                                <th class="py-3 px-4 bg-gray-100 text-gray-600 font-semibold uppercase text-sm">Member Name</th>
                                <th class="py-3 px-4 bg-gray-100 text-gray-600 font-semibold uppercase text-sm">Activity</th>
                                <th class="py-3 px-4 bg-gray-100 text-gray-600 font-semibold uppercase text-sm rounded-tr-lg">Contribution</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody">
                            <!-- Filtered members will be rendered here -->
                        </tbody>
                    </table>
                </div>
            `;
            appContentDiv.innerHTML = html;
            filterSummary(); // Initial render of summary table
        }

        /**
         * Renders the export contributions view.
         * Allows selecting a group and exporting its data to CSV.
         */
        function renderExportView() {
            const groupNames = Object.keys(groupsData);
            let optionsHtml = groupNames.map(name => `<option value="${name}">${name}</option>`).join('');

            let html = `
                <h2 class="text-2xl font-semibold text-gray-700 mb-6">Export Group Contributions</h2>
                <div class="flex flex-col sm:flex-row gap-4 mb-6 items-center">
                    <label for="groupSelect" class="text-gray-700 font-medium">Select Group:</label>
                    <select id="groupSelect" class="flex-grow p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        ${optionsHtml}
                    </select>
                    <button onclick="exportSelectedGroupContributions()" class="export-button px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg shadow-md transition duration-200 ease-in-out">Export to CSV</button>
                </div>
                <p class="text-gray-600 text-sm mt-4">Select a group from the dropdown and click "Export to CSV" to download a spreadsheet of its members and their contributions.</p>
            `;
            appContentDiv.innerHTML = html;
        }

        /**
         * Filters the summary table based on the search input.
         */
        function filterSummary() {
            const searchBar = document.getElementById('searchBar');
            const searchTerm = searchBar ? searchBar.value.toLowerCase() : '';
            const summaryTableBody = document.getElementById('summaryTableBody');
            let filteredHtml = '';
            let hasResults = false;

            for (const groupName in groupsData) {
                groupsData[groupName].forEach(member => {
                    const memberName = member.name.toLowerCase();
                    const activity = member.activity.toLowerCase();
                    const group = groupName.toLowerCase();
                    // Convert contribution to string for searching, handle undefined
                    const contribution = member.contribution !== undefined ? String(member.contribution).toLowerCase() : '';

                    if (memberName.includes(searchTerm) || activity.includes(searchTerm) || group.includes(searchTerm) || contribution.includes(searchTerm)) {
                        filteredHtml += `
                            <tr>
                                <td class="py-3 px-4 border-b border-gray-200 text-gray-700">${groupName}</td>
                                <td class="py-3 px-4 border-b border-gray-200 text-gray-700">${member.name}</td>
                                <td class="py-3 px-4 border-b border-gray-200 text-gray-700">${member.activity}</td>
                                <td class="py-3 px-4 border-b border-gray-200 text-gray-700">${member.contribution !== undefined ? member.contribution.toFixed(2) : 'N/A'}</td>
                            </tr>
                        `;
                        hasResults = true;
                    }
                });
            }

            if (!hasResults) {
                filteredHtml = `
                    <tr>
                        <td colspan="4" class="py-4 px-4 text-center text-gray-500">No matching members found or no members added yet.</td>
                    </tr>
                `;
            }
            summaryTableBody.innerHTML = filteredHtml;
        }

        /**
         * Adds a new member to the specified group.
         * @param {string} groupName - The name of the group to add the member to.
         */
        function addMember(groupName) {
            const newMemberNameInput = document.getElementById('newMemberName');
            const newActivityInput = document.getElementById('newActivity');
            const newContributionInput = document.getElementById('newContribution'); // Get new contribution input

            const name = newMemberNameInput.value.trim();
            const activity = newActivityInput.value.trim();
            // Parse contribution as a number, default to 0 if invalid or empty
            const contribution = parseFloat(newContributionInput.value.trim()) || 0;

            if (name && activity) { // Contribution can be 0, so only check name and activity
                groupsData[groupName].push({ name, activity, contribution }); // Add contribution
                newMemberNameInput.value = ''; // Clear input
                newActivityInput.value = '';   // Clear input
                newContributionInput.value = ''; // Clear contribution input
                renderApp(); // Re-render the current view to show the new member
            } else {
                // Simple message box instead of alert
                const messageBox = document.createElement('div');
                messageBox.className = 'fixed inset-0 bg-gray-800 bg-opacity-75 flex items-center justify-center z-50';
                messageBox.innerHTML = `
                    <div class="bg-white p-6 rounded-lg shadow-xl text-center">
                        <p class="text-lg font-semibold mb-4">Please enter both member name and activity.</p>
                        <button onclick="this.parentNode.parentNode.remove()" class="px-5 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">OK</button>
                    </div>
                `;
                document.body.appendChild(messageBox);
            }
        }

        /**
         * Deletes a member from the specified group.
         * @param {string} groupName - The name of the group to delete from.
         * @param {number} index - The index of the member to delete.
         */
        function deleteMember(groupName, index) {
            // Simple confirmation box
            const messageBox = document.createElement('div');
            messageBox.className = 'fixed inset-0 bg-gray-800 bg-opacity-75 flex items-center justify-center z-50';
            messageBox.innerHTML = `
                <div class="bg-white p-6 rounded-lg shadow-xl text-center">
                    <p class="text-lg font-semibold mb-4">Are you sure you want to delete this member?</p>
                    <button onclick="confirmDelete('${groupName}', ${index}); this.parentNode.parentNode.remove();" class="px-5 py-2 mr-2 bg-red-500 text-white rounded-md hover:bg-red-600">Yes</button>
                    <button onclick="this.parentNode.parentNode.remove()" class="px-5 py-2 bg-gray-300 text-gray-800 rounded-md hover:bg-gray-400">No</button>
                </div>
            `;
            document.body.appendChild(messageBox);
        }

        /**
         * Confirms and performs the deletion of a member.
         * @param {string} groupName - The name of the group.
         * @param {number} index - The index of the member to delete.
         */
        function confirmDelete(groupName, index) {
            groupsData[groupName].splice(index, 1);
            renderApp(); // Re-render the current view
        }

        /**
         * Exports the selected group's contribution data to a CSV file.
         */
        function exportSelectedGroupContributions() {
            const groupSelect = document.getElementById('groupSelect');
            const selectedGroupName = groupSelect.value;
            const membersToExport = groupsData[selectedGroupName];

            if (membersToExport.length === 0) {
                const messageBox = document.createElement('div');
                messageBox.className = 'fixed inset-0 bg-gray-800 bg-opacity-75 flex items-center justify-center z-50';
                messageBox.innerHTML = `
                    <div class="bg-white p-6 rounded-lg shadow-xl text-center">
                        <p class="text-lg font-semibold mb-4">No members to export in ${selectedGroupName}.</p>
                        <button onclick="this.parentNode.parentNode.remove()" class="px-5 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">OK</button>
                    </div>
                `;
                document.body.appendChild(messageBox);
                return;
            }

            // CSV Header
            let csvContent = "Group,Member Name,Activity,Contribution\n";

            // CSV Rows
            membersToExport.forEach(member => {
                const name = `"${member.name.replace(/"/g, '""')}"`; // Handle commas and quotes in name
                const activity = `"${member.activity.replace(/"/g, '""')}"`; // Handle commas and quotes in activity
                const contribution = member.contribution !== undefined ? member.contribution.toFixed(2) : '0.00';
                csvContent += `${selectedGroupName},${name},${activity},${contribution}\n`;
            });

            // Create a Blob and download it
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            if (link.download !== undefined) { // Feature detection for download attribute
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `${selectedGroupName}_Contributions.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                // Fallback for browsers that don't support download attribute
                const messageBox = document.createElement('div');
                messageBox.className = 'fixed inset-0 bg-gray-800 bg-opacity-75 flex items-center justify-center z-50';
                messageBox.innerHTML = `
                    <div class="bg-white p-6 rounded-lg shadow-xl text-center">
                        <p class="text-lg font-semibold mb-4">Your browser does not support direct file download. Please copy the data below:</p>
                        <textarea class="w-full h-32 p-2 border rounded-md mb-4">${csvContent}</textarea>
                        <button onclick="this.parentNode.parentNode.remove()" class="px-5 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">Close</button>
                    </div>
                `;
                document.body.appendChild(messageBox);
            }
        }


        /**
         * Renders the main application based on the active tab.
         * Updates tab buttons and content area.
         */
        function renderApp() {
            // Render Tab Buttons
            tabNavigationDiv.innerHTML = ''; // Clear existing buttons
            const groupNames = Object.keys(groupsData);

            // Add group tabs
            groupNames.forEach(name => {
                const button = document.createElement('button');
                button.textContent = name;
                button.className = `tab-button px-5 py-3 text-lg font-medium text-gray-600 hover:text-blue-600 hover:border-blue-300 border-b-3 border-transparent transition duration-200 ease-in-out ${activeTab === name ? 'active' : ''}`;
                button.onclick = () => {
                    activeTab = name;
                    renderApp(); // Re-render to update active tab style and content
                };
                tabNavigationDiv.appendChild(button);
            });

            // Add Summary tab
            const summaryButton = document.createElement('button');
            summaryButton.textContent = 'Summary';
            summaryButton.className = `tab-button px-5 py-3 text-lg font-medium text-gray-600 hover:text-blue-600 hover:border-blue-300 border-b-3 border-transparent transition duration-200 ease-in-out ${activeTab === 'Summary' ? 'active' : ''}`;
            summaryButton.onclick = () => {
                activeTab = 'Summary';
                renderApp(); // Re-render
            };
            tabNavigationDiv.appendChild(summaryButton);

            // Add Export Contributions tab
            const exportButton = document.createElement('button');
            exportButton.textContent = 'Export Contributions';
            exportButton.className = `tab-button px-5 py-3 text-lg font-medium text-gray-600 hover:text-blue-600 hover:border-blue-300 border-b-3 border-transparent transition duration-200 ease-in-out ${activeTab === 'Export' ? 'active' : ''}`;
            exportButton.onclick = () => {
                activeTab = 'Export';
                renderApp(); // Re-render
            };
            tabNavigationDiv.appendChild(exportButton);


            // Render Content based on active tab
            if (activeTab === 'Summary') {
                renderSummaryView();
            } else if (activeTab === 'Export') {
                renderExportView();
            }
            else {
                renderGroupView(activeTab);
            }
        }

        // Initial render when the page loads
        document.addEventListener('DOMContentLoaded', renderApp);
    </script>
</body>
</html>
